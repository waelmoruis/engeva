<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة السر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f3f4f6; }
        .card { background: white; border-radius: 16px; padding: 2rem; max-width: 450px; margin: 2rem auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-field { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
        .timer-bar { height: 4px; background: #e5e7eb; border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .timer-progress { height: 100%; background: #10b981; width: 100%; transition: width 1s linear; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="card">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">🔐 إعادة تعيين كلمة السر</h1>
            <p class="text-gray-600 mt-2">أدخل كلمة السر الجديدة</p>
        </div>

        <!-- رسالة التحميل -->
        <div id="loadingMessage" class="text-center py-4 text-gray-600">
            <div class="flex justify-center items-center">
                <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-green-600 ml-2"></div>
                <span>جاري التحقق من الرابط...</span>
            </div>
        </div>

        <!-- رسالة الخطأ -->
        <div id="errorBox" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm text-center fade-in"></div>

        <!-- رسالة النجاح -->
        <div id="successBox" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm text-center fade-in"></div>

        <!-- معلومات الرابط -->
        <div id="tokenInfo" class="hidden bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-lg mb-4 text-sm">
            <div class="flex justify-between items-center">
                <span>⏱️ الوقت المتبقي:</span>
                <span id="timeRemaining" class="font-bold">15:00</span>
            </div>
            <div class="timer-bar mt-2">
                <div id="timerProgress" class="timer-progress" style="width: 100%"></div>
            </div>
            <p class="text-xs mt-1 text-gray-600" id="emailDisplay"></p>
        </div>

        <!-- نموذج إعادة التعيين -->
        <form id="resetForm" class="hidden space-y-4 fade-in">
            <div>
                <label class="block text-gray-700 mb-2 font-medium">كلمة السر الجديدة</label>
                <input type="password" id="newPassword" required minlength="6"
                       class="input-field" placeholder="********">
                <p class="text-xs text-gray-500 mt-1">على الأقل 6 أحرف</p>
            </div>
            
            <div>
                <label class="block text-gray-700 mb-2 font-medium">تأكيد كلمة السر</label>
                <input type="password" id="confirmPassword" required minlength="6"
                       class="input-field" placeholder="********">
            </div>
            
            <button type="submit" id="submitBtn"
                    class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                تغيير كلمة السر
            </button>
        </form>
        
        <!-- رابط طلب رابط جديد -->
        <div id="requestNewLink" class="hidden text-center mt-4">
            <p class="text-sm text-gray-600 mb-2">انتهت صلاحية الرابط؟</p>
            <button onclick="goToForgotPassword()" 
                    class="text-green-600 hover:text-green-800 hover:underline text-sm font-medium">
                اضغط هنا لطلب رابط جديد
            </button>
        </div>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-sm text-green-600 hover:text-green-800 hover:underline">
                العودة لتسجيل الدخول
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <script>
        const supabaseClient = window.AppSupabase || window.supabase;
        let timerInterval;
        let tokenCreatedAt = null;
        let userEmail = null;
        let accessToken = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // استخراج التوكن من الرابط - الطريقة الصحيحة لـ Supabase
            // Supabase يضع التوكن في الهاش (#) وليس query string
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const queryParams = new URLSearchParams(window.location.search);
            
            // محاولة استخراج التوكن من عدة مصادر
            let token = hashParams.get('access_token') || queryParams.get('token') || queryParams.get('access_token');
            let type = hashParams.get('type') || queryParams.get('type');
            let email = queryParams.get('email') || localStorage.getItem('resetEmail');
            
            console.log('الرابط الكامل:', window.location.href);
            console.log('الهاش:', window.location.hash);
            console.log('التوكن:', token);
            console.log('النوع:', type);
            console.log('الإيميل:', email);
            
            if (!token) {
                showError('رابط غير صالح - التوكن غير موجود');
                document.getElementById('requestNewLink').classList.remove('hidden');
                return;
            }
            
            accessToken = token;
            
            try {
                // أولاً: محاولة تعيين الجلسة مباشرة (طريقة Supabase الصحيحة)
                if (type === 'recovery' || window.location.hash.includes('access_token')) {
                    try {
                        const { data, error } = await supabaseClient.auth.setSession({
                            access_token: token,
                            refresh_token: ''
                        });
                        
                        if (!error) {
                            console.log('تم تعيين الجلسة بنجاح:', data);
                            
                            // استخراج الإيميل من الجلسة
                            if (data?.user?.email) {
                                email = data.user.email;
                                userEmail = email;
                                console.log('الإيميل من الجلسة:', email);
                            }
                        }
                    } catch (sessionError) {
                        console.log('خطأ في تعيين الجلسة:', sessionError);
                    }
                }
                
                // ثانياً: محاولة فك التوكن لاستخراج الإيميل والوقت
                try {
                    const base64Url = token.split('.')[1];
                    if (base64Url) {
                        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                        const payload = JSON.parse(window.atob(base64));
                        
                        console.log('محتوى التوكن:', payload);
                        
                        // استخراج الإيميل من التوكن
                        if (!email) {
                            email = payload.email || payload.sub;
                        }
                        
                        // استخراج وقت الإنشاء
                        if (payload.iat) {
                            tokenCreatedAt = new Date(payload.iat * 1000);
                        }
                    }
                } catch (tokenError) {
                    console.log('لا يمكن فك التوكن', tokenError);
                }
                
                // إذا لم نجد الإيميل، نطلب من المستخدم إدخاله
                if (!email) {
                    const userInput = prompt('الرجاء إدخال بريدك الإلكتروني المرتبط بالطلب:');
                    if (userInput && userInput.includes('@')) {
                        email = userInput;
                    } else {
                        showError('لم نتمكن من تحديد البريد الإلكتروني. الرجاء طلب رابط جديد');
                        document.getElementById('requestNewLink').classList.remove('hidden');
                        return;
                    }
                }
                
                userEmail = email;
                
                // حساب الوقت المتبقي
                let timeRemaining = 15 * 60; // 15 دقيقة بالثواني
                
                if (tokenCreatedAt) {
                    const now = new Date();
                    const elapsedSeconds = Math.floor((now - tokenCreatedAt) / 1000);
                    timeRemaining = Math.max(0, 900 - elapsedSeconds); // 900 ثانية = 15 دقيقة
                    
                    console.log('وقت إنشاء التوكن:', tokenCreatedAt);
                    console.log('الوقت المنقضي (ثواني):', elapsedSeconds);
                    console.log('الوقت المتبقي (ثواني):', timeRemaining);
                    
                    if (timeRemaining <= 0) {
                        showError('⚠️ انتهت صلاحية الرابط. الرجاء طلب رابط جديد');
                        document.getElementById('requestNewLink').classList.remove('hidden');
                        return;
                    }
                }
                
                // التحقق من التوكن باستخدام verifyOtp (كحل بديل)
                try {
                    const { data, error } = await supabaseClient.auth.verifyOtp({
                        email: email,
                        token: token,
                        type: 'recovery'
                    });
                    
                    if (error) {
                        console.error('خطأ في التحقق:', error);
                        
                        // إذا كان الخطأ أن التوكن منتهي الصلاحية
                        if (error.message.includes('expired')) {
                            showError('انتهت صلاحية الرابط. الرجاء طلب رابط جديد');
                            document.getElementById('requestNewLink').classList.remove('hidden');
                            return;
                        }
                        // إذا كان الخطأ أن التوكن غير صالح، نكمل على أي حال لأننا قد نكون استخدمنا setSession
                        else if (!error.message.includes('invalid')) {
                            showError(error.message);
                            return;
                        }
                    } else {
                        console.log('تم التحقق بنجاح:', data);
                    }
                } catch (verifyError) {
                    console.log('خطأ في التحقق:', verifyError);
                }
                
                // إخفاء رسالة التحميل
                document.getElementById('loadingMessage').classList.add('hidden');
                
                // إظهار معلومات الرابط
                document.getElementById('tokenInfo').classList.remove('hidden');
                document.getElementById('resetForm').classList.remove('hidden');
                
                // إخفاء الإيميل
                const emailDisplay = document.getElementById('emailDisplay');
                if (emailDisplay) {
                    emailDisplay.textContent = `📧 ${email}`;
                }
                
                // حفظ في localStorage
                localStorage.setItem('resetEmail', email);
                localStorage.setItem('resetToken', token);
                
                // بدء العد التنازلي
                startCountdown(timeRemaining);
                
            } catch (error) {
                console.error('خطأ:', error);
                showError('حدث خطأ في التحقق من الرابط');
                document.getElementById('requestNewLink').classList.remove('hidden');
            }
        });
        
        // بدء العد التنازلي
        function startCountdown(initialSeconds) {
            let secondsRemaining = initialSeconds;
            updateTimerDisplay(secondsRemaining);
            
            timerInterval = setInterval(() => {
                secondsRemaining--;
                
                if (secondsRemaining <= 0) {
                    clearInterval(timerInterval);
                    handleTokenExpired();
                } else {
                    updateTimerDisplay(secondsRemaining);
                }
            }, 1000);
        }
        
        // تحديث عرض المؤقت
        function updateTimerDisplay(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            const timeString = `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
            
            document.getElementById('timeRemaining').textContent = timeString;
            
            // تحديث شريط التقدم
            const progressPercent = (seconds / 900) * 100;
            document.getElementById('timerProgress').style.width = `${progressPercent}%`;
            
            // تغيير اللون إذا قلت المدة عن 3 دقائق
            if (seconds < 180) {
                document.getElementById('timerProgress').style.background = '#ef4444';
                document.getElementById('timeRemaining').classList.add('text-red-600');
            } else if (seconds < 300) {
                document.getElementById('timerProgress').style.background = '#f59e0b';
                document.getElementById('timeRemaining').classList.add('text-yellow-600');
            } else {
                document.getElementById('timerProgress').style.background = '#10b981';
                document.getElementById('timeRemaining').classList.remove('text-red-600', 'text-yellow-600');
            }
        }
        
        // معالجة انتهاء الصلاحية
        function handleTokenExpired() {
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('tokenInfo').classList.add('hidden');
            showError('⚠️ انتهت صلاحية الرابط. الرجاء طلب رابط جديد');
            document.getElementById('requestNewLink').classList.remove('hidden');
            
            // تنظيف
            localStorage.removeItem('resetToken');
        }
        
        // الذهاب لصفحة نسيت كلمة السر
        function goToForgotPassword() {
            window.location.href = 'forgot-password.html';
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            if (newPassword !== confirmPassword) {
                alert('❌ كلمة السر غير متطابقة');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('❌ كلمة السر يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري التغيير...';
            
            try {
                // إيقاف المؤقت
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                
                // تحديث كلمة السر
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });
                
                if (error) throw error;
                
                // إظهار رسالة النجاح
                const successBox = document.getElementById('successBox');
                successBox.textContent = '✅ تم تغيير كلمة السر بنجاح';
                successBox.classList.remove('hidden');
                
                // إخفاء الفورم والمؤقت
                document.getElementById('resetForm').classList.add('hidden');
                document.getElementById('tokenInfo').classList.add('hidden');
                
                // تنظيف localStorage
                localStorage.removeItem('resetEmail');
                localStorage.removeItem('resetToken');
                
                // تسجيل الخروج
                await supabaseClient.auth.signOut();
                
                // التوجيه لصفحة الدخول بعد 3 ثواني
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
                
            } catch (error) {
                console.error('خطأ في تحديث كلمة السر:', error);
                
                let errorMessage = 'فشل تغيير كلمة السر';
                if (error.message.includes('expired')) {
                    errorMessage = 'انتهت صلاحية الجلسة. الرجاء طلب رابط جديد';
                    document.getElementById('requestNewLink').classList.remove('hidden');
                } else if (error.message.includes('same password')) {
                    errorMessage = 'كلمة السر الجديدة يجب أن تختلف عن القديمة';
                } else {
                    errorMessage = error.message;
                }
                
                alert('❌ ' + errorMessage);
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'تغيير كلمة السر';
            }
        });
        
        function showError(message) {
            document.getElementById('loadingMessage').classList.add('hidden');
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.remove('hidden');
            
            // إخفاء الخطأ بعد 15 ثانية
            setTimeout(() => {
                errorBox.classList.add('hidden');
            }, 15000);
        }
        
        // تنظيف المؤقت عند مغادرة الصفحة
        window.addEventListener('beforeunload', () => {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
        });
    </script>
</body>
</html>
