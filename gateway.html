<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التوجيه...</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            color: white;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="loader"></div>
        <h2>جاري تحميل الصفحة...</h2>
        <p>الرجاء الانتظار لحظة</p>
    </div>

    <script>
    // مستعد؟ خلينا نشتغل
    
    // 1. نجلب الكود من الرابط (مثلاً: gateway.html?to=admin)
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('to') || 'home';  // لو مفيش كود، نروح للرئيسية
    
    // 2. هذا هو قاموس الروابط (عدله حسب مشروعك)
    const routes = {
        // الصفحات الرئيسية
        'home': 'index.html',
        
        // صفحات الأدمن
        'admin': 'ADMIN/index.html',
        'dashboard': 'ADMIN/dashboard.html',
        'users': 'ADMIN/users.html',
        'groups': 'ADMIN/groups.html',
        'inventory': 'ADMIN/combined-data.html',
        'profile': 'ADMIN/profile.html',
        'create-user': 'ADMIN/create-user.html',
        'admin-reset': 'ADMIN/admin-reset-password.html',
        
        // صفحات المستخدم
        'user': 'user-login.html',
        'user-dashboard': 'user-dashboard.html',
        'user-profile': 'user-profile.html',
        'user-inventory': 'user-inventory.html',
        'user-reset': 'reset-password.html',
    }
    let destination = routes[code] || 'index.html';
    
    // أسماء الصفحات للعرض في شريط العنوان
    const pageTitles = {
        'dashboard': 'لوحة التحكم',
        'users': 'المستخدمين',
        'groups': 'المجموعات',
        'inventory': 'المخزون',
        'profile': 'الملف الشخصي',
        'create-user': 'إنشاء مستخدم',
        'home': 'الرئيسية',
    };
    
    // تغيير الرابط في شريط العنوان بدون إعادة تحميل
    const title = pageTitles[code] || 'نظام إدارة المخزون';
    history.replaceState(null, title, '/' + code);
    
    // تأخير بسيط ثم التوجيه
    setTimeout(function() {
        window.location.href = destination;
    }, 100);
    </script>
</body>
</html>
