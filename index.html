<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - نظام المشتريات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #48bb78 0%, #2f855a 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        @media (max-width: 640px) {
            .login-card {
                padding: 1.5rem !important;
            }
            h1 {
                font-size: 1.8rem !important;
            }
            .text-4xl {
                font-size: 2.2rem !important;
            }
            .w-20 {
                width: 4rem !important;
                height: 4rem !important;
            }
            .p-8 {
                padding: 1.5rem !important;
            }
            .text-lg {
                font-size: 1rem !important;
            }
            .btn-login {
                padding: 0.75rem !important;
            }
        }
        
        @media (min-width: 641px) and (max-width: 768px) {
            .login-card {
                max-width: 90%;
            }
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            background-color: #f9fafb;
        }
        
        .input-field:focus {
            border-color: #48bb78;
            box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.1);
            outline: none;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #48bb78 0%, #2f855a 100%);
            transition: all 0.3s ease;
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: bold;
            font-size: 1.125rem;
            border: none;
            cursor: pointer;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(72, 187, 120, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        button, a, input[type="checkbox"] {
            -webkit-tap-highlight-color: transparent;
        }
        
        .container {
            padding: 1rem;
        }
        
        .remember-checkbox {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        #rateLimitTimer {
            animation: pulse 2s infinite;
            font-family: 'Cairo', sans-serif;
            min-width: 250px;
            border: 2px solid #fbbf24;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            direction: ltr;
            z-index: 9999;
        }

        @media (max-width: 640px) {
            #rateLimitTimer {
                top: 10px;
                left: 10px;
                right: 10px;
                transform: none;
                width: calc(100% - 20px);
                font-size: 14px;
                padding: 12px !important;
            }
        }
        
        /* تنسيق شاشة التحميل */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .loading-spinner {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        
        .loading-spinner i {
            font-size: 40px;
            color: #2f855a;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-3 md:p-4">
    
    <!-- شاشة تحميل -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin text-4xl text-green-600 mb-3"></i>
            <p class="text-gray-700">جاري تسجيل الدخول...</p>
        </div>
    </div>

    <!-- بطاقة تسجيل الدخول -->
    <div class="login-card p-6 md:p-8">
        <!-- الشعار والترحيب -->
        <div class="text-center mb-6 md:mb-8">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-green-500 to-green-700 rounded-full flex items-center justify-center mx-auto mb-3 md:mb-4">
                <span class="text-3xl md:text-4xl text-white">📦</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-1 md:mb-2">نظام المشتريات</h1>
            <p class="text-sm md:text-base text-gray-600">سجل دخولك للوصول إلى لوحة التحكم</p>
        </div>

        <!-- رسائل الخطأ والنجاح -->
        <div id="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-3 md:px-4 py-2 md:py-3 rounded-lg mb-3 md:mb-4 text-sm md:text-base hidden"></div>
        <div id="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-3 md:px-4 py-2 md:py-3 rounded-lg mb-3 md:mb-4 text-sm md:text-base hidden"></div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" class="space-y-4 md:space-y-6">
            <!-- البريد الإلكتروني -->
            <div>
                <label class="block text-gray-700 mb-1 md:mb-2 text-sm md:text-base">البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute right-3 top-2.5 md:top-3 text-gray-400 text-sm md:text-base">📧</span>
                    <input type="email" id="email" required 
                           class="input-field pr-10 text-sm md:text-base"
                           placeholder="example@domain.com"
                           dir="ltr"
                           value="">
                </div>
            </div>

            <!-- كلمة المرور -->
            <div>
                <label class="block text-gray-700 mb-1 md:mb-2 text-sm md:text-base">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute right-3 top-2.5 md:top-3 text-gray-400 text-sm md:text-base">🔒</span>
                    <input type="password" id="password" required 
                           class="input-field pr-10 text-sm md:text-base"
                           placeholder="••••••••"
                           dir="ltr">
                </div>
            </div>

            <!-- خيارات إضافية - حفظ البريد الإلكتروني -->
            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="rememberEmail" class="remember-checkbox ml-2 rounded border-gray-300">
                    <span class="text-xs md:text-sm text-gray-600">حفظ البريد الإلكتروني</span>
                </label>
                <button type="button" id="forgotBtn" onclick="forgotPassword()" class="text-xs md:text-sm text-green-600 hover:text-green-800">
                    نسيت كلمة المرور؟
                </button>
            </div>

            <!-- زر الدخول -->
            <button type="submit" id="loginBtn"
                    class="btn-login text-sm md:text-base py-2 md:py-3">
                دخول
            </button>
        </form>

        <!-- روابط مساعدة -->
        <div class="mt-4 md:mt-6 text-center text-xs text-gray-500">
            <p>الإدارة الهندسية - برنامج المشتريات © 2026</p>
        </div>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <script>
    const supabaseClient = window.AppSupabase || window.supabase;

    // دالة التوجيه حسب الصلاحية
    function redirectByRole(role) {
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.style.display = 'flex';
        
        // جدول التوجيه حسب الصلاحية
        const redirectMap = {
            'admin': 'ADMIN/admin-dashboard.html',
            'general_manager': 'general-manager-dashboard.html',
            'dept_manager': 'dept-manager-dashboard.html',
            'procurement': 'procurement-dashboard.html',
            'employee': 'user-dashboard.html',
            'engineer': 'user-dashboard.html',
            'viewer': 'user-dashboard.html',
            'Oracle': 'Oracle-dashboard .html',
            'warehouses': 'user-inventory.html',
            'purchases': 'procurement-dashboard.html'
        };
        
        const redirectUrl = redirectMap[role] || 'user-dashboard.html';
        
        setTimeout(() => {
            window.location.href = redirectUrl;
        }, 1000);
    }

    // التحقق من وجود تايمر عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', async () => {
        // التحقق من وجود بريد محفوظ
        const savedEmail = localStorage.getItem('savedUserEmail');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('rememberEmail').checked = true;
        }
        
        // التحقق من وجود تايمر rate limit وإعادة تشغيله
        checkAndRestoreTimer();
        
        // التحقق من تسجيل الدخول المسبق
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            const { data: userData } = await supabaseClient
                .from('users')
                .select('role')
                .eq('id', user.id)
                .single();
            
            if (userData) {
                // إذا كان مسجل دخول مسبقاً، وجه حسب الصلاحية
                redirectByRole(userData.role);
            }
        }
    });

    // دالة للتحقق من وجود تايمر وإعادة تشغيله
    function checkAndRestoreTimer() {
        const timerEndTime = localStorage.getItem('rateLimitTimer');
        const forgotBtn = document.getElementById('forgotBtn');
        
        if (timerEndTime && forgotBtn) {
            const remainingTime = parseInt(timerEndTime) - new Date().getTime();
            
            if (remainingTime > 0) {
                restoreTimer(forgotBtn, 'نسيت كلمة المرور؟', remainingTime);
            } else {
                localStorage.removeItem('rateLimitTimer');
                forgotBtn.disabled = false;
                forgotBtn.textContent = 'نسيت كلمة المرور؟';
            }
        }
    }

    // دالة إعادة تشغيل التايمر بعد تحديث الصفحة
    function restoreTimer(button, originalText, remainingMs) {
        button.disabled = true;
        
        if (!document.getElementById('rateLimitTimer')) {
            const timerDiv = document.createElement('div');
            timerDiv.id = 'rateLimitTimer';
            timerDiv.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-yellow-100 border border-yellow-400 text-yellow-800 px-6 py-3 rounded-lg shadow-lg z-50 text-center';
            timerDiv.style.direction = 'ltr';
            document.body.appendChild(timerDiv);
        }
        
        const endTime = new Date().getTime() + remainingMs;
        
        const timerInterval = setInterval(() => {
            const now = new Date().getTime();
            const remaining = endTime - now;
            
            if (remaining <= 0) {
                clearInterval(timerInterval);
                localStorage.removeItem('rateLimitTimer');
                
                const existingTimer = document.getElementById('rateLimitTimer');
                if (existingTimer) {
                    document.body.removeChild(existingTimer);
                }
                
                button.disabled = false;
                button.textContent = originalText;
                return;
            }
            
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            
            const timerElement = document.getElementById('rateLimitTimer');
            if (timerElement) {
                timerElement.innerHTML = `⏱️ الانتظار: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} دقيقة`;
            }
            
            button.textContent = `انتظر ${minutes}:${seconds.toString().padStart(2, '0')}`;
        }, 1000);
    }

    // دالة نسيت كلمة المرور
    async function forgotPassword() {
        const email = prompt('أدخل بريدك الإلكتروني لإرسال رابط إعادة تعيين كلمة المرور:');
        
        if (!email) return;

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert('❌ الرجاء إدخال بريد إلكتروني صحيح');
            return;
        }

        const forgotBtn = document.getElementById('forgotBtn');
        const originalText = forgotBtn.textContent;
        
        forgotBtn.disabled = true;
        forgotBtn.textContent = 'جاري الإرسال...';

        try {
            localStorage.setItem('resetEmail', email);
            
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + 'gateway.html?to=reset-password',
            });

            if (error) {
                if (error.message.includes('rate limit')) {
                    alert('⏱️ تم تجاوز الحد المسموح به. الرجاء الانتظار دقيقة ثم المحاولة مرة أخرى');
                    forgotBtn.disabled = false;
                    forgotBtn.textContent = originalText;
                    return;
                }
                throw error;
            }

            alert('✅ تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني');
            forgotBtn.disabled = false;
            forgotBtn.textContent = originalText;

        } catch (error) {
            console.error('خطأ:', error);
            alert('❌ ' + error.message);
            localStorage.removeItem('resetEmail');
            forgotBtn.disabled = false;
            forgotBtn.textContent = originalText;
        }
    }

    // معالجة تسجيل الدخول مع التوجيه حسب الصلاحية
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const rememberEmail = document.getElementById('rememberEmail').checked;
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // حفظ البريد الإلكتروني إذا تم اختيار الخيار
        if (rememberEmail) {
            localStorage.setItem('savedUserEmail', email);
        } else {
            localStorage.removeItem('savedUserEmail');
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'جاري تسجيل الدخول...';
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        try {
            const { data: { user }, error: authError } = await supabaseClient.auth.signInWithPassword({
                email, password
            });

            if (authError) throw authError;

            // جلب بيانات المستخدم من جدول users
            const { data: userData, error: dbError } = await supabaseClient
                .from('users')
                .select('*')
                .eq('id', user.id)
                .single();

            if (dbError) throw dbError;

          // السماح للمديرين بالدخول من نفس الصفحة
            if (userData.role === 'admin') {
                // التوجيه إلى لوحة تحكم المدير
                window.location.href = '../ADMIN/';
                return;
            }
            // حفظ بيانات المستخدم في localStorage
            localStorage.setItem('currentUser', JSON.stringify(userData));
            localStorage.setItem('userRole', userData.role);
            
            // عرض رسالة نجاح
            successDiv.textContent = `✅ مرحباً ${userData.full_name || userData.username}`;
            successDiv.classList.remove('hidden');
            
            // إظهار شاشة التحميل
            loadingOverlay.style.display = 'flex';
            
            // التوجيه حسب الصلاحية
            setTimeout(() => {
                redirectByRole(userData.role);
            }, 500);

        } catch (error) {
            errorDiv.textContent = error.message;
            errorDiv.classList.remove('hidden');
            
            loginBtn.disabled = false;
            loginBtn.textContent = 'دخول';
            loadingOverlay.style.display = 'none';
        }
    });

    // دالة التوجيه حسب الصلاحية (متاحة عالمياً)
    window.redirectByRole = redirectByRole;
    window.forgotPassword = forgotPassword;
    </script>
</body>
</html>
