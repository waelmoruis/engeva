<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>الملف الشخصي - نظام المشتريات</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: #f0f9f0; overflow-x: hidden; }
        
        .sidebar { position: fixed; right: 0; top: 0; width: 280px; height: 100%; background: linear-gradient(180deg, #2f855a 0%, #1e5a3a 100%); color: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 1000; transition: transform 0.3s ease; overflow-y: auto; }
        .sidebar.collapsed { transform: translateX(100%); }
        .main-content { transition: margin-right 0.3s ease; min-height: 100vh; padding: 20px; }
        .main-content.expanded { margin-right: 0; }
        .main-content:not(.expanded) { margin-right: 280px; }
        .toggle-sidebar-btn { position: fixed; top: 20px; right: 20px; z-index: 1001; background: #2f855a; color: white; border: none; border-radius: 8px; padding: 10px 15px; font-size: 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); transition: all 0.3s; }
        .toggle-sidebar-btn:hover { background: #1e5a3a; transform: scale(1.05); }
        
        @media (max-width: 768px) {
            .main-content:not(.expanded) { margin-right: 0; }
            .sidebar { transform: translateX(100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .toggle-sidebar-btn { top: 15px; right: 15px; padding: 8px 12px; font-size: 16px; }
            .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
            .overlay.active { display: block; }
            .profile-card { padding: 20px !important; }
            .info-grid { grid-template-columns: 1fr !important; }
        }
        @media (min-width: 769px) { .overlay { display: none !important; } }
        
        .sidebar a, .sidebar button { display: flex; align-items: center; padding: 12px 16px; border-radius: 8px; margin-bottom: 5px; color: rgba(255,255,255,0.9); text-decoration: none; width: 100%; background: transparent; border: none; cursor: pointer; transition: all 0.3s; font-size: 14px; }
        .sidebar a:hover, .sidebar button:hover { background: rgba(255,255,255,0.2); color: white; }
        .sidebar a.active { background: rgba(255,255,255,0.3); color: white; }
        .profile-section { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; }
        .profile-avatar { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; border: 3px solid white; }
        
        /* بطاقة الملف الشخصي */
        .profile-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, #2f855a 0%, #1e5a3a 100%);
        }
        .profile-photo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: -60px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .profile-photo-inner {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #48bb78 0%, #2f855a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }
        .profile-name {
            text-align: center;
            margin-top: 15px;
        }
        .profile-name h2 {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
        }
        .profile-name p {
            color: #2f855a;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .info-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .info-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
            word-break: break-word;
        }
        
        .stats-card {
            background: #f0f9f0;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #d1fae5;
        }
        .stats-number {
            font-size: 32px;
            font-weight: bold;
            color: #2f855a;
        }
        .stats-label {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .activity-icon {
            width: 40px;
            height: 40px;
            background: #f0f9f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2f855a;
        }
        .activity-content {
            flex: 1;
        }
        .activity-title {
            font-weight: 600;
            font-size: 14px;
            color: #1f2937;
        }
        .activity-time {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 3px;
        }
        
        .btn-edit {
            background: #2f855a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-edit:hover {
            background: #1e5a3a;
            transform: translateY(-1px);
        }
        .btn-change-password {
            background: #e2e8f0;
            color: #4a5568;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-change-password:hover {
            background: #cbd5e0;
            transform: translateY(-1px);
        }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; }
        .modal.open { display: flex; }
        .modal-content { background: white; border-radius: 20px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #e2e8f0; }
        .modal-title { font-size: 18px; font-weight: bold; color: #2f855a; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #718096; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #4a5568; font-size: 13px; }
        .form-group input { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 14px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding: 15px; border-top: 1px solid #e2e8f0; }
        
        .message { padding: 12px 16px; border-radius: 12px; margin-bottom: 15px; display: none; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        
        .footer { text-align: center; padding: 12px; color: #718096; font-size: 11px; border-top: 1px solid #e2e8f0; margin-top: 20px; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2f855a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>
    <button class="toggle-sidebar-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <div id="sidebar" class="sidebar">
        <div class="profile-section">
            <div class="profile-avatar" id="profileInitial">م</div>
            <div id="profileName" class="font-bold text-lg">جاري التحميل...</div>
            <div id="profileRole" class="text-sm text-white/80 mt-1">مدير إدارة</div>
        </div>
        <nav>
            <a href="general-manager-dashboard.html" class="active"><i class="fas fa-tachometer-alt ml-2"></i> لوحة التحكم</a>
            <a href="general-manager-requests.html"><i class="fas fa-clipboard-list ml-2"></i> جميع الطلبات</a>
            <a href="manager-profile.html"><i class="fas fa-user ml-2"></i> الملف الشخصي</a>
            <button onclick="logout()"><i class="fas fa-sign-out-alt ml-2"></i> تسجيل خروج</button>
        </nav>
        <div class="absolute bottom-0 w-full p-4 text-center text-white/60 text-xs border-t border-white/20">
            <p>الإدارة الهندسية - برنامج المشتريات © 2026</p>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-green-700">👤 الملف الشخصي</h1>
        </div>

        <div id="errorMessage" class="message error"></div>
        <div id="successMessage" class="message success"></div>

        <!-- بطاقة الملف الشخصي -->
        <div class="profile-card">
            <div class="profile-cover"></div>
            <div class="profile-photo">
                <div class="profile-photo-inner" id="profilePhotoLetter">م</div>
            </div>
            <div class="profile-name">
                <h2 id="profileFullName">جاري التحميل...</h2>
                <p id="profileRoleText">مدير إدارة</p>
            </div>
            
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-envelope text-green-600"></i>
                        <span>البريد الإلكتروني</span>
                    </div>
                    <div class="info-value" id="profileEmail">—</div>
                </div>
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-user-tag text-green-600"></i>
                        <span>اسم المستخدم</span>
                    </div>
                    <div class="info-value" id="profileUsername">—</div>
                </div>
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-building text-green-600"></i>
                        <span>القسم</span>
                    </div>
                    <div class="info-value" id="profileDepartment">—</div>
                </div>
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-layer-group text-green-600"></i>
                        <span>المجموعة</span>
                    </div>
                    <div class="info-value" id="profileGroup">—</div>
                </div>
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-calendar-alt text-green-600"></i>
                        <span>تاريخ الانضمام</span>
                    </div>
                    <div class="info-value" id="profileJoinDate">—</div>
                </div>
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-clock text-green-600"></i>
                        <span>آخر تسجيل دخول</span>
                    </div>
                    <div class="info-value" id="profileLastSeen">—</div>
                </div>
            </div>
            
            <div class="flex justify-center gap-4 pb-6">
                <button class="btn-edit" onclick="openEditProfileModal()">
                    <i class="fas fa-edit"></i> تعديل الملف الشخصي
                </button>
                <button class="btn-change-password" onclick="openChangePasswordModal()">
                    <i class="fas fa-key"></i> تغيير كلمة المرور
                </button>
            </div>
        </div>

        

    <!-- مودال تعديل الملف الشخصي -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">✏️ تعديل الملف الشخصي</h2>
                <button onclick="closeModal('editProfileModal')" class="close-btn">✕</button>
            </div>
            <div class="p-5">
                <form id="editProfileForm">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="editFullName" required>
                    </div>
                    <div class="form-group">
                        <label>القسم</label>
                        <input type="text" id="editDepartment">
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn-edit">💾 حفظ التغييرات</button>
                        <button type="button" onclick="closeModal('editProfileModal')" class="btn-change-password">إلغاء</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- مودال تغيير كلمة المرور -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">🔐 تغيير كلمة المرور</h2>
                <button onclick="closeModal('changePasswordModal')" class="close-btn">✕</button>
            </div>
            <div class="p-5">
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label>كلمة المرور الحالية</label>
                        <input type="password" id="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور الجديدة</label>
                        <input type="password" id="newPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>تأكيد كلمة المرور الجديدة</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn-edit">🔄 تغيير كلمة المرور</button>
                        <button type="button" onclick="closeModal('changePasswordModal')" class="btn-change-password">إلغاء</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        const supabaseClient = window.AppSupabase || window.supabase;
        let currentUser = null;
        let userData = null;

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
            } catch(e) { return dateStr; }
        }

        async function loadUserProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { 
                window.location.href = 'index.html'; 
                return; 
            }
            
            // جلب بيانات المستخدم من جدول users
            const { data: u, error } = await supabaseClient
                .from('users')
                .select('*, groups(name)')
                .eq('id', user.id)
                .single();
            
            if (error) {
                console.error('خطأ:', error);
                return;
            }
            
            userData = u;
            currentUser = u;
            
            // عرض البيانات
            const displayName = u.full_name || u.username;
            document.getElementById('profileFullName').textContent = displayName;
            document.getElementById('profilePhotoLetter').textContent = displayName.charAt(0);
            document.getElementById('profileName').textContent = displayName;
            document.getElementById('profileInitial').textContent = displayName.charAt(0);
            document.getElementById('profileEmail').textContent = u.email || '—';
            document.getElementById('profileUsername').textContent = u.username || '—';
            document.getElementById('profileDepartment').textContent = u.department || '—';
            document.getElementById('profileGroup').textContent = u.groups?.name || '—';
            document.getElementById('profileJoinDate').textContent = formatDate(u.created_at);
            document.getElementById('profileLastSeen').textContent = formatDate(u.last_seen) || '—';
            
            let roleText = '';
            if (u.role === 'general_manager') roleText = 'مدير إدارة';
            else if (u.role === 'dept_manager') roleText = 'مدير قسم';
            else if (u.role === 'admin') roleText = 'مدير النظام';
            else if (u.role === 'procurement') roleText = 'مدير مشتريات';
            else roleText = u.role || 'مستخدم';
            document.getElementById('profileRoleText').textContent = roleText;
            
            // تحميل إحصائيات الطلبات
            await loadRequestStats();
        }

        async function loadRequestStats() {
            try {
                // جلب طلبات المستخدم (التي قدمها أو التي وافق عليها)
                const { data: requests, error } = await supabaseClient
                    .from('الطلبات')
                    .select('*')
                    .eq('submitted_by', currentUser.id);
                
                if (error) throw error;
                
                const total = requests.length;
                const approved = requests.filter(r => r.Status === 'Manager Done' || r.Status === 'Oracle Done').length;
                const pending = requests.filter(r => r.Status === 'ON Request' || r.Status === 'ON Request New Code').length;
                
                document.getElementById('requestsCount').textContent = total;
                document.getElementById('approvedRequestsCount').textContent = approved;
                document.getElementById('pendingRequestsCount').textContent = pending;
            } catch(e) {
                console.error('خطأ في تحميل الإحصائيات:', e);
            }
        }

        async function updateProfile() {
            const fullName = document.getElementById('editFullName').value.trim();
            const department = document.getElementById('editDepartment').value.trim();
            
            if (!fullName) {
                Swal.fire('تنبيه', 'الرجاء إدخال الاسم الكامل', 'warning');
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('users')
                    .update({ 
                        full_name: fullName,
                        department: department || null,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', currentUser.id);
                
                if (error) throw error;
                
                Swal.fire('✅ تم التحديث', 'تم تحديث الملف الشخصي بنجاح', 'success');
                closeModal('editProfileModal');
                await loadUserProfile();
            } catch(e) {
                Swal.fire('خطأ', e.message, 'error');
            }
        }

        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!currentPassword || !newPassword || !confirmPassword) {
                Swal.fire('تنبيه', 'الرجاء ملء جميع الحقول', 'warning');
                return;
            }
            
            if (newPassword.length < 6) {
                Swal.fire('تنبيه', 'كلمة المرور الجديدة يجب أن تكون 6 أحرف على الأقل', 'warning');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                Swal.fire('تنبيه', 'كلمة المرور الجديدة وتأكيدها غير متطابقين', 'warning');
                return;
            }
            
            try {
                // تحديث كلمة المرور في Supabase Auth
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });
                
                if (error) throw error;
                
                Swal.fire('✅ تم التغيير', 'تم تغيير كلمة المرور بنجاح', 'success');
                closeModal('changePasswordModal');
                document.getElementById('changePasswordForm').reset();
            } catch(e) {
                Swal.fire('خطأ', e.message, 'error');
            }
        }

        function openEditProfileModal() {
            document.getElementById('editFullName').value = userData?.full_name || '';
            document.getElementById('editDepartment').value = userData?.department || '';
            document.getElementById('editProfileModal').classList.add('open');
        }

        function openChangePasswordModal() {
            document.getElementById('changePasswordForm').reset();
            document.getElementById('changePasswordModal').classList.add('open');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('open');
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const overlay = document.getElementById('overlay');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-open');
                overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
                mainContent.classList.toggle('expanded');
            }
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('mobile-open');
            document.getElementById('overlay').classList.remove('active');
        }

        document.getElementById('editProfileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            updateProfile();
        });

        document.getElementById('changePasswordForm').addEventListener('submit', (e) => {
            e.preventDefault();
            changePassword();
        });

        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.querySelector('.toggle-sidebar-btn');
            if (window.innerWidth <= 768 && sidebar.classList.contains('mobile-open') && !sidebar.contains(e.target) && !toggleBtn.contains(e.target)) closeSidebar();
        });
        
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('mobile-open');
                document.getElementById('overlay').classList.remove('active');
            }
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            loadUserProfile();
        });
        
        window.openEditProfileModal = openEditProfileModal;
        window.openChangePasswordModal = openChangePasswordModal;
        window.closeModal = closeModal;
        window.logout = logout;
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
    </script>
</body>
</html>
